name: iOS Build & Upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15     # Xcode 26 beta is available on macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          # Use Xcode 26 beta (SDK 26) if available, otherwise latest
          if [ -d "/Applications/Xcode_26.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26.0.app
          elif [ -d "/Applications/Xcode_26_beta.app" ]; then
            sudo xcode-select -s /Applications/Xcode_26_beta.app
          else
            XCODE=$(ls /Applications/ | grep -i "Xcode_2[6-9]" | sort -r | head -1)
            if [ -n "$XCODE" ]; then
              sudo xcode-select -s "/Applications/$XCODE"
            fi
          fi
          xcodebuild -version

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Install Fastlane
        run: gem install fastlane

      - name: Create output directory
        run: mkdir -p ~/Desktop/SuqafuranIPA

      - name: Build IPA
        working-directory: ios/App
        run: fastlane build
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          DISTRIBUTION_CERT_P12: ${{ secrets.DISTRIBUTION_CERT_P12 }}
          DISTRIBUTION_CERT_PASSWORD: ${{ secrets.DISTRIBUTION_CERT_PASSWORD }}

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Suqafuran.ipa
          path: ~/Desktop/SuqafuranIPA/*.ipa
          retention-days: 30
