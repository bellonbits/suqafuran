name: iOS Build & Upload

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync ios

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
          working-directory: ios/App

      - name: Install Fastlane
        run: gem install fastlane

      - name: Write App Store Connect API key
        run: |
          mkdir -p ~/Downloads
          echo "${{ secrets.APP_STORE_CONNECT_API_KEY }}" > ~/Downloads/AuthKey_C8V4ZN3UG9.p8

      - name: Create output directory
        run: mkdir -p ~/Desktop/SuqafuranIPA

      - name: Build IPA
        working-directory: ios/App
        run: fastlane build

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Suqafuran.ipa
          path: ~/Desktop/SuqafuranIPA/Suqafuran.ipa
          retention-days: 30
