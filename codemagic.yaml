workflows:
  ios-ipa:
    name: iOS IPA Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: suqafuran

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.suqafuran.app
      node: 20
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install JS dependencies
        script: npm ci

      - name: Build web app
        script: npm run build

      - name: Capacitor sync
        script: npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Build IPA
        script: |
          cd ios/App
          xcode-project use-profiles
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            | xcpretty
          xcodebuild \
            -exportArchive \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            -exportOptionsPlist $CM_BUILD_DIR/ExportOptions.plist \
            -exportPath $CM_BUILD_DIR/ipa \
            | xcpretty

    artifacts:
      - $CM_BUILD_DIR/ipa/*.ipa
      - $CM_BUILD_DIR/App.xcarchive
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - your@email.com   # replace with your email
        notify:
          success: true
          failure: true
