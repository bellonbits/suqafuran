  <script>
    // Immediate service worker cleanup on Capacitor native platforms to prevent blank screens
    if (
      (window.location.hostname === 'localhost' && !window.location.port) ||
      window.location.protocol === 'capacitor:'
    ) {
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          if (regs.length > 0) {
            for (var i = 0; i < regs.length; i++) {
              regs[i].unregister();
            }
            if ('caches' in window) {
              caches.keys().then(function(keys) {
                keys.forEach(function(key) { caches.delete(key); });
              });
            }
            window.location.reload();
          }
        });
      }
    }
  </script>

  <!-- ── JSON-LD: WebSite + SearchAction (Sitelinks Search Box) ──────── -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "Suqafuran",
    "alternateName": "Suqafuran Marketplace",

    "description": "Africa's free online marketplace — buy and sell anything online.",
    "potentialAction": {
      "@type": "SearchAction",

        "urlTemplate": "https://suqafuran.com/search?q={search_term_string}"
      },

  }
