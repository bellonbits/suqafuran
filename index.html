<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/suqafuran.svg" />
  <link rel="icon" type="image/x-icon" href="/suqafuran.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ffffff" />
  <link rel="apple-touch-icon" href="/suqafuran.svg">
  <title>Suqafuran — Buy & Sell in Somalia | Africa's Marketplace</title>
  <meta name="description" content="Suqafuran is Somalia's leading online marketplace. Buy and sell cars, phones, livestock, electronics, clothes and more. Post a free ad today." />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <!-- Google Translate -->
  <style>
    /* Hide GT toolbar completely */
    .goog-te-banner-frame,
    #goog-gt-tt,
    .goog-te-balloon-frame,
    .goog-te-ftab-float,
    #goog-gt-votingFrame { display: none !important; }
    body { top: 0 !important; position: static !important; }
    .goog-te-combo, .skiptranslate { display: none !important; }
    /* Prevent the translated font from looking ugly */
    font { background-color: transparent !important; }
  </style>
  <script>
    // Before React mounts: ensure googtrans cookie matches localStorage choice
    // so Google Translate is applied from the very first paint on every page.
    (function() {
      var saved = localStorage.getItem('suqafuran_lang') || 'en';
      var cookieMatch = document.cookie.match(/(?:^|;\s*)googtrans=([^;]+)/);
      var cookieVal = cookieMatch ? cookieMatch[1] : '';
      var desired = saved === 'so' ? '/en/so' : '/en/en';
      if (cookieVal !== desired) {
        var d = window.location.hostname;
        document.cookie = 'googtrans=' + desired + '; path=/';
        document.cookie = 'googtrans=' + desired + '; path=/; domain=' + d;
        document.cookie = 'googtrans=' + desired + '; path=/; domain=.' + d;
      }
    })();
  </script>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        {
          pageLanguage: 'en',
          includedLanguages: 'en,so',
          autoDisplay: false,
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE
        },
        'google_translate_element'
      );
    }
  </script>
  <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</head>

<body>
  <div id="google_translate_element" style="display:none"></div>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
