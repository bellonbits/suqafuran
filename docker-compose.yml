version: '3.8'

services:
  # FastAPI Backend - connects to DigitalOcean managed DB & Redis
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: suqafuran-backend
    env_file: .env
    ports:
      - "8011:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    networks:
      - suqafuran-network
    restart: always

  # Next.js Frontend
  frontend:
    build:
      context: ./new-frontend
      dockerfile: Dockerfile
    container_name: suqafuran-frontend
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8011/api/v1
      NEXT_PUBLIC_APP_NAME: Suqafuran
      NEXT_PUBLIC_ENVIRONMENT: production
    ports:
      - "3000:3000"
    volumes:
      - ./new-frontend:/app
      - /app/.next
      - /app/node_modules
    networks:
      - suqafuran-network
    restart: always
    depends_on:
      - backend

networks:
  suqafuran-network:
    driver: bridge
