services:
  redis:
    image: redis:7-alpine
    container_name: suqafuran_redis
    restart: always
    security_opt:
      - seccomp:unconfined
    env_file:
      - ./backend/.env
    command: >
      sh -c "redis-server --requirepass ${REDIS_PASSWORD:-suqaredis} --maxmemory 256mb --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD:-suqaredis} ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suqafuran_api
    restart: always
    security_opt:
      - seccomp:unconfined
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --keep-alive 5 --access-logfile - --error-logfile -"
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: suqafuran_worker
    restart: always
    security_opt:
      - seccomp:unconfined
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: >
      celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,promotions,notifications

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: suqafuran_beat
    restart: always
    security_opt:
      - seccomp:unconfined
    dns:
      - 8.8.8.8
      - 1.1.1.1
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
    command: >
      sh -c "rm -f /app/celerybeat-schedule /app/celerybeat-schedule.db && celery -A app.tasks.celery_app beat --loglevel=info"

  nginx:
    image: nginx:alpine
    container_name: suqafuran_nginx
    restart: always
    security_opt:
      - seccomp:unconfined
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
      - uploads:/app/uploads:ro

  certbot:
    image: certbot/certbot
    container_name: suqafuran_certbot
    security_opt:
      - seccomp:unconfined
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "if [ $# -gt 0 ]; then exec certbot \"$@\"; else while :; do certbot renew; sleep 12h & wait $$!; done; fi", "--"]


volumes:
  redis_data:
  uploads:
  certs:
  certbot_webroot:
