version: '3.8'

services:
  # FastAPI Backend - connects to DigitalOcean managed DB & Redis
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: suqafuran-backend
    env_file: .env
    ports:
      - "8011:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    networks:
      - suqafuran-network
    restart: always

networks:
  suqafuran-network:
    driver: bridge
