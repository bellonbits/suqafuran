version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: suqafuran-postgres
    environment:
      POSTGRES_USER: suqafuran
      POSTGRES_PASSWORD: ${DB_PASSWORD:-suqafuran}
      POSTGRES_DB: suqafuran
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suqafuran"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Redis for caching & Celery
  redis:
    image: redis:7-alpine
    container_name: suqafuran-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Kafka for event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: suqafuran-kafka
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Zookeeper for Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: suqafuran-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Jaeger for distributed tracing
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: suqafuran-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suqafuran-backend
    environment:
      DATABASE_URL: postgresql://suqafuran:${DB_PASSWORD:-suqafuran}@postgres:5432/suqafuran
      REDIS_URL: redis://redis:6379/0
      ENVIRONMENT: ${ENVIRONMENT:-production}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      JAEGER_QUERY_URL: http://jaeger:16686
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suqafuran-celery
    command: celery -A app.tasks.celery_app worker -l info -c 4
    environment:
      DATABASE_URL: postgresql://suqafuran:${DB_PASSWORD:-suqafuran}@postgres:5432/suqafuran
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Celery Beat
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suqafuran-celery-beat
    command: celery -A app.tasks.celery_app beat -l info --pidfile=/tmp/celerybeat.pid
    environment:
      DATABASE_URL: postgresql://suqafuran:${DB_PASSWORD:-suqafuran}@postgres:5432/suqafuran
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    volumes:
      - ./backend:/app
      - celerybeat_data:/app/celerybeat
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    build:
      context: ./new-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    container_name: suqafuran-frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - suqafuran-network
    restart: unless-stopped

  # Kafka UI
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: suqafuran-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: suqafuran
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "8080:8080"
    depends_on:
      - kafka
    networks:
      - suqafuran-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  zookeeper_data:
  celerybeat_data:

networks:
  suqafuran-network:
    driver: bridge
