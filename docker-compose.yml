version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: suqafuran-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-doadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_n3l_adWBnU_ieYWiXYS}
      POSTGRES_DB: ${POSTGRES_DB:-defaultdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-doadmin}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suqafuran-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: suqafuran-redis
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-suqaredis}
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-suqaredis}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - suqafuran-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: suqafuran-backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      POSTGRES_SERVER: postgres
      POSTGRES_USER: ${POSTGRES_USER:-doadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_n3l_adWBnU_ieYWiXYS}
      POSTGRES_DB: ${POSTGRES_DB:-defaultdb}
      POSTGRES_PORT: 5432

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-suqaredis}
      REDIS_DB: 0

      # JWT & Security
      SECRET_KEY: ${SECRET_KEY:-sqf-prod-2026-j8kXm!nP@qR4vW#zA9cE0hL5tY2uI7oF3bG6dN1sM}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-525600}

      # Email
      SMTP_HOST: ${SMTP_HOST:-mail.privateemail.com}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-gatitu@evidflow.com}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-gatitu@evidflow132}
      SMTP_SSL: ${SMTP_SSL:-true}
      EMAILS_FROM_EMAIL: ${EMAILS_FROM_EMAIL:-gatitu@evidflow.com}
      EMAILS_FROM_NAME: ${EMAILS_FROM_NAME:-Suqafuran}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-no-reply@suqafuran.com}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-Suqafuran}

      # Africa's Talking
      AFRICASTALKING_USERNAME: ${AFRICASTALKING_USERNAME}
      AFRICASTALKING_API_KEY: ${AFRICASTALKING_API_KEY}
      AFRICASTALKING_SENDER_ID: ${AFRICASTALKING_SENDER_ID}

      # Environment
      ENVIRONMENT: ${ENVIRONMENT:-production}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:3001,http://localhost:3002}

    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./backend/uploads:/app/uploads
    networks:
      - suqafuran-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: suqafuran-frontend
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api/v1}
      NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-Suqafuran}
      NEXT_PUBLIC_ENVIRONMENT: ${NEXT_PUBLIC_ENVIRONMENT:-development}
    ports:
      - "3000:3000"
    volumes:
      - ./new-frontend:/app
      - /app/.next
    networks:
      - suqafuran-network

  # Celery Worker (Optional - for background tasks)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: suqafuran-celery
    depends_on:
      - redis
      - postgres
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-suqaredis}
      POSTGRES_SERVER: postgres
      POSTGRES_USER: ${POSTGRES_USER:-doadmin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-AVNS_n3l_adWBnU_ieYWiXYS}
      POSTGRES_DB: ${POSTGRES_DB:-defaultdb}
      SECRET_KEY: ${SECRET_KEY:-sqf-prod-2026-j8kXm!nP@qR4vW#zA9cE0hL5tY2uI7oF3bG6dN1sM}
    command: celery -A app.tasks.celery_app worker --loglevel=info --queues=default,notifications
    networks:
      - suqafuran-network

networks:
  suqafuran-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
