version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: suqafuran_redis
    restart: always
    env_file:
      - ./backend/.env
    command: >
      sh -c "redis-server --requirepass $${REDIS_PASSWORD:-suqaredis} --maxmemory 256mb --maxmemory-policy allkeys-lru"
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a $${REDIS_PASSWORD:-suqaredis} ping | grep PONG" ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: suqafuran_api
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    ports:
      - "8000:8000"
    command: sh -c "alembic upgrade head && gunicorn app.main:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 120 --keep-alive 5 --access-logfile - --error-logfile -"
    healthcheck:
      test: [ "CMD-SHELL", "python3 -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000/health\")' || exit 1" ]
      interval: 15s
      timeout: 10s
      retries: 5

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: suqafuran_worker
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - uploads:/app/uploads
    command: >
      celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2 -Q default,promotions,notifications

  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: suqafuran_beat
    restart: always
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://tempo:4317
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
    command: >
      celery -A app.tasks.celery_app beat --loglevel=info

  nginx:
    image: nginx:alpine
    container_name: suqafuran_nginx
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/nginx/certs:ro
      - certbot_webroot:/var/www/certbot:ro
      - uploads:/app/uploads:ro

  certbot:
    image: certbot/certbot
    container_name: suqafuran_certbot
    volumes:
      - certs:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: ["/bin/sh", "-c", "if [ $# -gt 0 ]; then exec certbot \"$@\"; else while :; do certbot renew; sleep 12h & wait $$!; done; fi", "--"]

  prometheus:
    image: prom/prometheus:latest
    container_name: suqafuran_prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    expose:
      - "9090"

  grafana:
    image: grafana/grafana:latest
    container_name: suqafuran_grafana
    restart: always
    depends_on:
      - prometheus
      - loki
      - tempo
      - alertmanager
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=https://api.suqafuran.com/monitoring/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana

  tempo:
    image: grafana/tempo:latest
    container_name: suqafuran_tempo
    restart: always
    volumes:
      - ./monitoring/tempo/tempo.yml:/etc/tempo-config.yaml:ro
    command: ["-config.file=/etc/tempo-config.yaml", "-target=all"]
    expose:
      - "3200" # HTTP
      - "4317" # OTLP gRPC

  loki:
    image: grafana/loki:latest
    container_name: suqafuran_loki
    restart: always
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    expose:
      - "3100"

  promtail:
    image: grafana/promtail:latest
    container_name: suqafuran_promtail
    restart: always
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      # - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log:/var/log:ro
    command: -config.file=/etc/promtail/config.yml

  alertmanager:
    image: prom/alertmanager:latest
    container_name: suqafuran_alertmanager
    restart: always
    volumes:
      - ./monitoring/prometheus/alertmanager.yml:/etc/prometheus/alertmanager.yml:ro
    command:
      - '--config.file=/etc/prometheus/alertmanager.yml'
      - '--storage.path=/alertmanager'
    expose:
      - "9093"

  celery-exporter:
    image: danihodovic/celery-exporter:latest
    container_name: suqafuran_celery_exporter
    restart: always
    environment:
      - CE_BROKER_URL=redis://:${REDIS_PASSWORD:-suqaredis}@redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    expose:
      - "9808"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    container_name: suqafuran_node_exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    expose:
      - "9100"


volumes:
  redis_data:
  uploads:
  certs:
  certbot_webroot:
  prometheus_data:
  grafana_data:
  loki_data:

