events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream api_upstream {
        server api:8888;
        keepalive 32;
    }

    upstream frontend_upstream {
        server frontend:80;
        keepalive 32;
    }

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com; script-src-elem 'self' 'unsafe-inline' https://translate.google.com https://translate.googleapis.com https://translate-pa.googleapis.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com https://unpkg.com; style-src-elem 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.gstatic.com https://unpkg.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.suqafuran.com https://translate.googleapis.com https://translate-pa.googleapis.com https://res.cloudinary.com; frame-src https://translate.google.com https://www.google.com; frame-ancestors 'none';" always;
    server_tokens off;

    # Rate limit zones
    limit_req_zone $binary_remote_addr zone=api_global:10m rate=60r/m;
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_upload:10m rate=10r/m;

    # CORS origin map — allowed origins for the API
    map $http_origin $cors_origin {
        default                        "";
        "https://localhost"            $http_origin;
        "http://localhost"             $http_origin;
        "http://localhost:5173"        $http_origin;
        "capacitor://localhost"        $http_origin;
        "https://suqafuran.com"        $http_origin;
        "https://www.suqafuran.com"    $http_origin;
        "https://suqafuran.vercel.app" $http_origin;
    }

    server {
        listen 80;
        server_name api.suqafuran.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        http2 on;
        server_name api.suqafuran.com;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        client_max_body_size 15M;

        location / {
            # Handle CORS preflight
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin  $cors_origin always;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;
                add_header Access-Control-Allow-Credentials "true" always;
                add_header Access-Control-Max-Age 86400 always;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Inject CORS headers on all responses
            add_header Access-Control-Allow-Origin      $cors_origin always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header Access-Control-Allow-Methods     "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers     "Authorization, Content-Type, Accept, Origin, X-Requested-With" always;

            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;

            # Remove duplicate CORS headers from upstream to avoid conflicts
            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Credentials;
        }
    }

    server {
        listen 80;
        server_name _;

        client_max_body_size 15M;

        # Frontend — serve React app
        location / {
            proxy_pass http://frontend_upstream/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Health check
        location = /health {
            proxy_pass http://api_upstream/health;
            proxy_set_header Host $host;
        }

        # Auth endpoints — strict rate limit
        location ~ ^/api/v1/auth/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            limit_req zone=api_auth burst=3 nodelay;
        }

        # Upload endpoints — moderate rate limit
        location ~ ^/api/v1/listings/upload {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            limit_req zone=api_upload burst=5 nodelay;
            client_max_body_size 15M;
        }

        # All other API routes
        location /api/ {
            proxy_pass http://api_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            limit_req zone=api_global burst=20 nodelay;
        }

        # Serve uploaded images directly with long cache
        location /api/v1/listings/images/ {
            alias /app/uploads/;
            expires 365d;
            add_header Cache-Control "public, max-age=31536000, immutable";
            add_header Vary "Accept-Encoding";
            types {
                image/webp  webp;
                image/jpeg  jpg jpeg;
                image/png   png;
            }
            try_files $uri =404;
        }
    }


}
