apiVersion: v1
kind: Service
metadata:
  name: suqafuran-api
  namespace: suqafuran
  labels:
    app: suqafuran-api
spec:
  type: ClusterIP
  selector:
    app: suqafuran-api
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
